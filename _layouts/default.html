<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<canvas id="aurora"></canvas>

<div class="page">

<!-- NAV -->

      <path d="M6 13C6 13 8.5 10.5 13 10.5C17.5 10.5 20 13 20 13" stroke="#22d3ee" stroke-width="1.1" stroke-linecap="round"/>
      <path d="M8 17C8 17 10 15 13 15C16 15 18 17 18 17" stroke="#8b5cf6" stroke-width="0.9" stroke-linecap="round"/>
      <circle cx="13" cy="20" r="1.8" fill="#00d4b4" opacity="0.9"/>
    </svg>

  </a>

{{ content }}

    <li><a href="{{ '/status' | relative_url }}">Status</a></li>

</div>

<script>
// ── Contact email — change once, updates everywhere ──
const CONTACT_EMAIL = 'hello@borealislogistics.com';
document.querySelectorAll('[data-mailto]').forEach(a => a.href = 'mailto:' + CONTACT_EMAIL);

const canvas = document.getElementById('aurora');
const ctx = canvas.getContext('2d');
let W, H, elapsed = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const bands = [
  { color: [0, 212, 180],   y: 0.15, amp: 0.07, speed: 0.38, thick: 0.22 },
  { color: [34, 211, 238],  y: 0.28, amp: 0.09, speed: 0.28, thick: 0.18 },
  { color: [124, 58, 237],  y: 0.42, amp: 0.06, speed: 0.48, thick: 0.15 },
  { color: [56, 189, 248],  y: 0.56, amp: 0.08, speed: 0.33, thick: 0.13 },
  { color: [168, 85, 247],  y: 0.68, amp: 0.05, speed: 0.42, thick: 0.11 },
];

function drawAurora() {
  ctx.clearRect(0, 0, W, H);
  for (const b of bands) {
    const baseY = b.y * H;
    const CURVE_POINTS = 8;
    for (let layer = 0; layer < 3; layer++) {
      ctx.beginPath();
      const pts = [];
      for (let i = 0; i <= CURVE_POINTS; i++) {
        const x = (i / CURVE_POINTS) * W;
        const y = baseY
          + Math.sin(elapsed * b.speed + i * 0.75 + layer * 1.4) * b.amp * H
          + Math.sin(elapsed * b.speed * 1.3 + i * 1.2 + layer * 0.9) * b.amp * 0.4 * H;
        pts.push({ x, y });
      }
      const top = pts.map(p => ({ x: p.x, y: p.y - b.thick * H * 0.5 }));
      ctx.moveTo(top[0].x, top[0].y);
      for (let i = 1; i < top.length; i++) {
        const cp = { x: (top[i-1].x + top[i].x) / 2, y: (top[i-1].y + top[i].y) / 2 };
        ctx.quadraticCurveTo(top[i-1].x, top[i-1].y, cp.x, cp.y);
      }
      for (let i = pts.length - 1; i >= 0; i--) {
        const by = pts[i].y + b.thick * H;
        if (i === pts.length - 1) { ctx.lineTo(pts[i].x, by); continue; }
        const nx = pts[i+1].x, ny = pts[i+1].y + b.thick * H;
        ctx.quadraticCurveTo(nx, ny, (pts[i].x + nx) / 2, (by + ny) / 2);
      }
      ctx.closePath();
      const opacity = (0.15 - layer * 0.04) * (1 + Math.sin(elapsed * 0.28 + layer) * 0.3);
      ctx.fillStyle = `rgba(${b.color[0]},${b.color[1]},${b.color[2]},${opacity})`;
      ctx.fill();
    }
  }
  elapsed += 0.005;
  requestAnimationFrame(drawAurora);
}
drawAurora();
</script>
</body>
</html>
