<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borealis Logistics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0a0e1a;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .aurora {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #a8c4e8;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #6b7fa8;
      letter-spacing: 0.05em;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #2a3a5c;
      margin: 0 auto 2rem;
    }

    p {
      font-size: 0.95rem;
      color: #7a8aaa;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    a {
      color: #7ab8e8;
      text-decoration: none;
    }

    a:hover {
      color: #a8d4f8;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #2e3a52;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="aurora">🌌</span>
    <h1>Borealis Logistics</h1>
    <p class="tagline">Software — Open Source First</p>
    <div class="divider"></div>
    <p>We build software for operators who need it to work.<br />
    Minnesota-based. More coming soon.</p>
    <p><a href="mailto:hello@borealislogistics.com">hello@borealislogistics.com</a></p>
  </div>
  <footer>© 2026 Borealis Logistics</footer>
</body>
</html>
